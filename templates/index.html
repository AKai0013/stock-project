<h1>台股選股系統</h1>

<button onclick="load()">載入資料</button>

<h2>趨勢股</h2>
<div id="trend"></div>

<script>
async function load() {
    const res = await fetch("https://stock-project-bnio.onrender.com/api/stocks");
    const data = await res.json();

    document.getElementById("trend").innerHTML =
        data.trend.map(s => `<p>${s.Stock} - ${s.Close}</p>`).join("");
}
</script>
